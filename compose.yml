services:
    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx.proxy.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - frontend
            - backend

    frontend:
      build:
        context: .
      restart: unless-stopped
      env_file:
        - .env

    backend:
      build:
        context: ../via-api
      restart: unless-stopped
      env_file:
        - .env

    cron:
      build:
        context: ./cron
      volumes:
        - ../UofT-Scraper:/scraper
        - ../via-api:/backend
      env_file:
        - .env
      depends_on:
        - backend
      restart: unless-stopped